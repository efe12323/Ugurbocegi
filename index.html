<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AI Otomatik Altyazı - Pro Creator</title>
    <style>
        :root { --accent: #facc15; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* ÖNİZLEME ALANI */
        .preview-container {
            position: relative;
            width: 340px;
            height: 600px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #1a1a1a;
            box-shadow: 0 0 50px rgba(250, 204, 21, 0.1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* ÖZEL ALTYAZI TASARIMI */
        #caption-overlay {
            position: absolute;
            top: 45%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        .caption-word {
            font-size: 3.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 4px 4px 0px #000;
            -webkit-text-stroke: 1px black;
            display: inline-block;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-word { color: var(--accent); transform: scale(1.2) rotate(-2deg); }

        /* KONTROL PANELİ */
        .controls { margin-top: 20px; background: #111; padding: 20px; border-radius: 12px; text-align: center; width: 340px; }
        button { background: var(--accent); color: black; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        button:disabled { background: #444; color: #888; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #aaa; font-family: monospace; }
        input[type="file"] { margin-bottom: 15px; width: 100%; }
    </style>
</head>
<body>

    <div class="preview-container">
        <video id="vPlayer" controls></video>
        <div id="caption-overlay">
            <span id="wordBox" class="caption-word"></span>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="vUpload" accept="video/*">
        <button id="startBtn">VİDEOYU ANALİZ ET VE BAŞLAT</button>
        <div id="status">Bekleniyor...</div>
    </div>

    <script>
        const API_KEY = "549e51d96f844ac19b843caeba52e697"; // Senin API Anahtarın
        const vPlayer = document.getElementById('vPlayer');
        const vUpload = document.getElementById('vUpload');
        const startBtn = document.getElementById('startBtn');
        const wordBox = document.getElementById('wordBox');
        const status = document.getElementById('status');

        let wordsData = [];

        vUpload.onchange = (e) => {
            vPlayer.src = URL.createObjectURL(e.target.files[0]);
            status.innerText = "Video yüklendi. Analize hazır.";
        };

        startBtn.onclick = async () => {
            const file = vUpload.files[0];
            if (!file) return alert("Lütfen bir video seç!");

            startBtn.disabled = true;
            status.innerText = "1/3: Video sunucuya yükleniyor...";

            try {
                // 1. Dosyayı Upload Et
                const uploadResponse = await fetch("https://api.assemblyai.com/v2/upload", {
                    method: "POST",
                    headers: { "authorization": API_KEY },
                    body: file
                });
                const uploadResult = await uploadResponse.json();
                const audioUrl = uploadResult.upload_url;

                // 2. Transkripsiyon Başlat
                status.innerText = "2/3: AI Sesi analiz ediyor...";
                const transResponse = await fetch("https://api.assemblyai.com/v2/transcript", {
                    method: "POST",
                    headers: { "authorization": API_KEY, "content-type": "application/json" },
                    body: JSON.stringify({ 
                        audio_url: audioUrl, 
                        language_detection: true 
                    })
                });
                const transResult = await transResponse.json();
                const transcriptId = transResult.id;

                // 3. Polling (Bitti mi kontrol et)
                const checkStatus = setInterval(async () => {
                    const pollRes = await fetch(`https://api.assemblyai.com/v2/transcript/${transcriptId}`, {
                        headers: { "authorization": API_KEY }
                    });
                    const pollResult = await pollRes.json();

                    if (pollResult.status === 'completed') {
                        clearInterval(checkStatus);
                        wordsData = pollResult.words; // Kelime kelime zamanlamalar
                        status.innerText = "3/3: Tamamlandı! Video başlıyor...";
                        startBtn.disabled = false;
                        vPlayer.play();
                    } else if (pollResult.status === 'error') {
                        clearInterval(checkStatus);
                        status.innerText = "Hata oluştu!";
                        startBtn.disabled = false;
                    } else {
                        status.innerText = "Analiz devam ediyor... (Lütfen bekleyin)";
                    }
                }, 3000);

            } catch (err) {
                console.error(err);
                status.innerText = "Bir hata oluştu.";
                startBtn.disabled = false;
            }
        };

        // ALTYAZI TAKİP SİSTEMİ
        vPlayer.ontimeupdate = () => {
            if (wordsData.length === 0) return;
            
            const currentTimeMs = vPlayer.currentTime * 1000;
            const currentWord = wordsData.find(w => currentTimeMs >= w.start && currentTimeMs <= w.end);

            if (currentWord) {
                wordBox.innerText = currentWord.text;
                wordBox.classList.add('active-word');
                
                // Animasyonu her kelimede sıfırla (Zıplama efekti)
                wordBox.style.animation = 'none';
                wordBox.offsetHeight; 
                wordBox.style.animation = null;
            } else {
                wordBox.innerText = "";
            }
        };
    </script>
</body>
</html>
