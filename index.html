<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AI Subtitle Editor & Downloader</title>
    <style>
        :root { --accent: #facc15; --bg: #050505; --panel: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* EDITOR ALANI */
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        .preview-wrapper {
            position: relative;
            width: 340px;
            height: 600px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #333;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* SÜRÜKLENEBİLİR ALTYAZI */
        #caption-overlay {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            cursor: move;
            user-select: none;
            touch-action: none;
        }
        .subtitle-word {
            font-size: 3.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 4px 4px 0px #000;
            -webkit-text-stroke: 1.5px black;
            display: inline-block;
        }
        .active { color: var(--accent); transform: scale(1.2); }

        /* PANEL */
        .controls {
            width: 340px;
            background: var(--panel);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-process { background: var(--accent); color: #000; }
        .btn-download { background: #22c55e; color: #fff; display: none; }
        #status { font-size: 12px; color: #38bdf8; font-family: monospace; text-align: center; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="preview-wrapper" id="captureArea">
            <video id="vPlayer" crossOrigin="anonymous"></video>
            <div id="caption-overlay">
                <span id="wordBox" class="subtitle-word"></span>
            </div>
        </div>

        <div class="controls">
            <h3 style="margin:0; color:var(--accent)">AI EDITOR</h3>
            <input type="file" id="vUpload" accept="video/*">
            <button id="processBtn" class="btn-process">ANALİZ ET</button>
            <button id="downloadBtn" class="btn-download">ALTYAZILI VİDEOYU İNDİR</button>
            <div id="status">Video yükleyin...</div>
            <p style="font-size:10px; color:#666; margin:0">İpucu: Altyazıyı tutup istediğin yere sürükle!</p>
        </div>
    </div>

    <script>
        const API_KEY = "549e51d96f844ac19b843caeba52e697";
        const vPlayer = document.getElementById('vPlayer');
        const vUpload = document.getElementById('vUpload');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const wordBox = document.getElementById('wordBox');
        const overlay = document.getElementById('caption-overlay');
        const status = document.getElementById('status');

        let wordsData = [];
        let mediaRecorder;
        let recordedChunks = [];

        // 1. SÜRÜKLE BIRAK SİSTEMİ
        let isDragging = false;
        overlay.onmousedown = (e) => isDragging = true;
        window.onmouseup = () => isDragging = false;
        window.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = document.getElementById('captureArea').getBoundingClientRect();
            let y = e.clientY - rect.top;
            if (y > 0 && y < rect.height - 50) {
                overlay.style.top = y + "px";
            }
        };

        // 2. DOSYA YÜKLEME
        vUpload.onchange = (e) => {
            vPlayer.src = URL.createObjectURL(e.target.files[0]);
            status.innerText = "Video yüklendi.";
        };

        // 3. AI ANALİZ
        processBtn.onclick = async () => {
            if (!vUpload.files[0]) return alert("Video seç!");
            processBtn.disabled = true;
            status.innerText = "AI Analiz Başladı...";

            try {
                const uploadRes = await fetch("https://api.assemblyai.com/v2/upload", {
                    method: "POST",
                    headers: { "authorization": API_KEY },
                    body: vUpload.files[0]
                });
                const { upload_url } = await uploadRes.json();

                const transRes = await fetch("https://api.assemblyai.com/v2/transcript", {
                    method: "POST",
                    headers: { "authorization": API_KEY, "content-type": "application/json" },
                    body: JSON.stringify({ 
                        audio_url: upload_url, 
                        language_detection: true,
                        speech_models: ["universal-3-pro", "universal-2"] 
                    })
                });
                const { id: transcriptId } = await transRes.json();

                const check = setInterval(async () => {
                    const poll = await (await fetch(`https://api.assemblyai.com/v2/transcript/${transcriptId}`, {
                        headers: { "authorization": API_KEY }
                    })).json();

                    if (poll.status === 'completed') {
                        clearInterval(check);
                        wordsData = poll.words;
                        status.innerText = "Analiz Bitti! Artık İndirebilirsin.";
                        processBtn.disabled = false;
                        downloadBtn.style.display = "block";
                        vPlayer.play();
                    } else if (poll.status === 'error') {
                        clearInterval(check);
                        status.innerText = "Hata!";
                    }
                }, 3000);
            } catch (e) { status.innerText = "Sistem Hatası!"; }
        };

        // 4. ALTYAZI GÜNCELLEME
        vPlayer.ontimeupdate = () => {
            const time = vPlayer.currentTime * 1000;
            const word = wordsData.find(w => time >= w.start && time <= w.end);
            if (word) {
                wordBox.innerText = word.text;
                wordBox.classList.add('active');
            } else { wordBox.innerText = ""; }
        };

        // 5. VİDEO İNDİRME SİSTEMİ (Record & Export)
        downloadBtn.onclick = async () => {
            status.innerText = "Video Hazırlanıyor... Lütfen bekleyin.";
            vPlayer.currentTime = 0;
            vPlayer.play();

            const stream = document.getElementById('captureArea').captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "altyazili_video.webm";
                a.click();
                status.innerText = "İndirme Başladı!";
            };

            mediaRecorder.start();
            vPlayer.onended = () => mediaRecorder.stop();
        };
    </script>
</body>
</html>
