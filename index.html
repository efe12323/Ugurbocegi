<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ücretsiz Otomatik Altyazı</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #FFD700; /* Altın sarısı vurgu */
            --sub-bg: rgba(0, 0, 0, 0.7);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .video-container {
            position: relative;
            width: 360px; /* Shorts formatı dikey */
            height: 640px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #222;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ALTYAZI ALANI */
        #caption-box {
            position: absolute;
            bottom: 20%;
            width: 90%;
            left: 5%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .word {
            display: inline-block;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
            margin: 0 5px;
            opacity: 0.3;
            transform: scale(0.8);
            transition: all 0.1s ease;
        }

        /* Aktif kelime stili */
        .word.active {
            opacity: 1;
            transform: scale(1.2) rotate(-2deg);
            color: var(--accent);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button, input[type="file"] {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        #status { color: #888; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="videoPlayer" playsinline></video>
        <div id="caption-box"></div>
    </div>

    <div class="controls">
        <input type="file" id="fileInput" accept="video/*">
        <button id="startBtn" style="background: #22c55e; color: white;">Altyazıyı Başlat</button>
    </div>

    <div id="status">Bekleniyor...</div>

    <script>
        const video = document.getElementById('videoPlayer');
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const captionBox = document.getElementById('caption-box');
        const status = document.getElementById('status');

        // Tarayıcı Ses Tanıma Motoru (Ücretsiz)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'tr-TR';

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            video.src = URL.createObjectURL(file);
            status.innerText = "Video yüklendi. 'Başlat'a bas ve video oynarken konuşmayı bekle.";
        });

        startBtn.addEventListener('click', () => {
            video.play();
            recognition.start();
            status.innerText = "Sistem Dinliyor... (Video sesini dışarı verin)";
        });

        recognition.onresult = (event) => {
            let interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    // Final metni kutuya bas
                    renderWords(event.results[i][0].transcript);
                } else {
                    interimTranscript += event.results[i][0].transcript;
                    renderWords(interimTranscript);
                }
            }
        };

        function renderWords(text) {
            captionBox.innerHTML = '';
            const words = text.split(' ');
            
            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.classList.add('word');
                // En son söylenen kelimeyi parlat (Vurgu Efekti)
                if(index === words.length - 1) span.classList.add('active');
                span.innerText = word;
                captionBox.appendChild(span);
            });
        }

        recognition.onerror = (err) => {
            console.error("Hata:", err.error);
            status.innerText = "Hata oluştu: " + err.error;
        };
    </script>
</body>
</html>
