<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UğurBöceğiHub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #0f0f0f;
            color: #fff;
        }
        
        header {
            background: #000;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(255,0,0,0.4);
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #ff0000;
        }
        
        .search {
            flex: 1;
            max-width: 620px;
            margin: 0 25px;
            padding: 14px 24px;
            border-radius: 50px;
            border: none;
            background: #272727;
            color: #fff;
            font-size: 16px;
        }
        
        .nav a {
            color: #fff;
            margin: 0 20px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        .nav a:hover, .nav a.active {
            color: #ff0000;
        }
        
        .container {
            padding: 25px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-title {
            font-size: 28px;
            margin: 40px 0 20px;
            color: #ff0000;
            border-bottom: 3px solid #333;
            padding-bottom: 10px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 25px;
        }
        
        .video-card {
            background: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.35);
        }
        
        .thumbnail {
            width: 100%;
            height: 165px;
            object-fit: cover;
        }
        
        .info {
            padding: 14px;
        }
        
        .title {
            font-size: 16.5px;
            margin: 0 0 6px;
            line-height: 1.35;
            font-weight: 500;
        }
        
        .desc {
            font-size: 13.8px;
            color: #aaa;
        }
        
        /* Shorts Bölümü - Daha güzel */
        .shorts-section {
            margin-top: 30px;
        }
        
        .shorts-container {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding: 10px 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .short-card {
            min-width: 195px;
            background: #1f1f1f;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: start;
            transition: transform 0.3s;
        }
        
        .short-card:hover {
            transform: scale(1.06);
        }
        
        .short-thumb {
            width: 100%;
            height: 340px;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
        }
        
        .short-info {
            padding: 12px;
            font-size: 15px;
            font-weight: 500;
        }
        
        /* Shorts Player - Tam ekran dikey */
        .shorts-player {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .shorts-player-content {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            position: relative;
        }
        
        .shorts-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .close-shorts {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            z-index: 100;
        }
        
        /* Normal Video Player */
        .video-player-page {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9998;
            align-items: center;
            justify-content: center;
        }
        
        .player-container {
            max-width: 1100px;
            width: 95%;
            padding: 20px;
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            background: #333;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
        }
        
        iframe {
            width: 100%;
            height: 620px;
            border: none;
            border-radius: 12px;
        }
        
        /* Admin */
        .admin-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .admin-content {
            background: #1f1f1f;
            padding: 35px;
            border-radius: 16px;
            width: 90%;
            max-width: 460px;
        }
        
        .admin-content input, .admin-content textarea {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
        }
        
        .admin-content button {
            width: 100%;
            padding: 16px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
            iframe { height: 520px; }
            .short-thumb { height: 310px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">UğurBöceğiHub</div>
    <input type="text" class="search" id="search-input" placeholder="Video veya Shorts ara..." onkeyup="searchContent()">
    <div class="nav">
        <a onclick="switchTab(0)" class="active" id="tab-videos">Videolar</a>
        <a onclick="switchTab(1)" id="tab-shorts">Shorts</a>
    </div>
</header>

<div class="container">
    <div id="videos-section">
        <h2 class="section-title">Öne Çıkan Videolar</h2>
        <div class="grid" id="videos-grid"></div>
    </div>

    <div id="shorts-section" class="shorts-section" style="display:none;">
        <h2 class="section-title">Shorts</h2>
        <div class="shorts-container" id="shorts-row"></div>
    </div>
</div>

<!-- Normal Video Player -->
<div class="video-player-page" id="video-player">
    <div class="player-container">
        <button class="close-btn" onclick="closePlayer()">✕ Kapat</button>
        <h1 id="player-title"></h1>
        <iframe id="player-iframe" allowfullscreen></iframe>
        <p id="player-desc" style="margin-top:25px; color:#ddd; font-size:17px;"></p>
    </div>
</div>

<!-- Shorts Player (Gerçek gibi dikey) -->
<div class="shorts-player" id="shorts-player">
    <div class="shorts-player-content">
        <button class="close-shorts" onclick="closeShortsPlayer()">✕</button>
        <iframe id="shorts-iframe" allowfullscreen allow="autoplay"></iframe>
    </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="admin-panel">
    <div class="admin-content">
        <h2 style="color:#ff0000; margin-top:0;">Video / Shorts Ekle</h2>
        <input type="text" id="admin-title" placeholder="Başlık">
        <textarea id="admin-desc" rows="3" placeholder="Açıklama"></textarea>
        <input type="text" id="admin-url" placeholder="Video URL (mp4 veya YouTube)">
        <input type="text" id="admin-thumb" placeholder="Thumbnail URL (opsiyonel)">
        <label style="color:#ccc; display:block; margin:10px 0;">
            <input type="checkbox" id="admin-is-short"> Shorts olarak ekle
        </label>
        <button onclick="addVideoLocal()">JSON Kopyala → data.json'a Yapıştır</button>
        <button onclick="closeAdminPanel()" style="background:#555;">Kapat</button>
    </div>
</div>

<script>
let allVideos = [];
let allShorts = [];

async function loadData() {
    try {
        const res = await fetch('./data.json');
        const data = await res.json();
        allVideos = data.videos || [];
        allShorts = data.shorts || [];
        renderVideos();
        renderShorts();
    } catch(e) {
        alert("data.json dosyası aynı klasörde olmalı!");
    }
}

function renderVideos(filtered = null) {
    const grid = document.getElementById('videos-grid');
    grid.innerHTML = '';
    (filtered || allVideos).forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <img src="${v.thumbnail}" class="thumbnail">
            <div class="info">
                <div class="title">${v.title}</div>
                <div class="desc">${(v.description || '').substring(0, 85)}...</div>
            </div>
        `;
        card.onclick = () => playNormalVideo(v);
        grid.appendChild(card);
    });
}

function renderShorts() {
    const container = document.getElementById('shorts-row');
    container.innerHTML = '';
    allShorts.forEach(s => {
        const card = document.createElement('div');
        card.className = 'short-card';
        card.innerHTML = `
            <img src="${s.thumbnail}" class="short-thumb">
            <div class="short-info">${s.title}</div>
        `;
        card.onclick = () => playShorts(s);
        container.appendChild(card);
    });
}

function playNormalVideo(v) {
    document.getElementById('player-title').textContent = v.title;
    document.getElementById('player-desc').textContent = v.description || '';
    document.getElementById('player-iframe').src = v.url;
    document.getElementById('video-player').style.display = 'flex';
}

function closePlayer() {
    document.getElementById('video-player').style.display = 'none';
    document.getElementById('player-iframe').src = '';
}

function playShorts(s) {
    document.getElementById('shorts-iframe').src = s.url;
    document.getElementById('shorts-player').style.display = 'flex';
}

function closeShortsPlayer() {
    document.getElementById('shorts-player').style.display = 'none';
    document.getElementById('shorts-iframe').src = '';
}

function searchContent() {
    const term = document.getElementById('search-input').value.toLowerCase().trim();
    if (!term) {
        renderVideos();
        return;
    }
    const filtered = allVideos.filter(v => 
        v.title.toLowerCase().includes(term) || (v.description && v.description.toLowerCase().includes(term))
    );
    renderVideos(filtered);
}

function switchTab(tab) {
    document.getElementById('tab-videos').classList.toggle('active', tab === 0);
    document.getElementById('tab-shorts').classList.toggle('active', tab === 1);
    document.getElementById('videos-section').style.display = tab === 0 ? 'block' : 'none';
    document.getElementById('shorts-section').style.display = tab === 1 ? 'block' : 'none';
}

function showAdmin() {
    document.getElementById('admin-panel').style.display = 'flex';
}

function closeAdminPanel() {
    document.getElementById('admin-panel').style.display = 'none';
}

function addVideoLocal() {
    const title = document.getElementById('admin-title').value.trim();
    const desc = document.getElementById('admin-desc').value.trim();
    let url = document.getElementById('admin-url').value.trim();
    const thumb = document.getElementById('admin-thumb').value.trim();
    const isShort = document.getElementById('admin-is-short').checked;

    if (!title || !url) {
        alert("Başlık ve URL zorunlu!");
        return;
    }

    if (url.includes("youtube.com/watch?v=")) {
        const id = url.split("v=")[1].split("&")[0];
        url = `https://www.youtube.com/embed/${id}`;
    } else if (url.includes("youtu.be/")) {
        const id = url.split("youtu.be/")[1].split("?")[0];
        url = `https://www.youtube.com/embed/${id}`;
    }

    const newItem = {
        id: Date.now(),
        title: title,
        description: desc,
        url: url,
        thumbnail: thumb || (isShort ? "https://via.placeholder.com/195x340/ff0000/fff?text=Short" : "https://via.placeholder.com/290x165/ff0000/fff?text=Video"),
        is_short: isShort
    };

    const jsonStr = JSON.stringify(newItem, null, 4);
    navigator.clipboard.writeText(jsonStr).then(() => {
        alert("✅ JSON kopyalandı!\n\ndata.json dosyasına yapıştır (videos veya shorts array'ine).\nSonra sayfayı yenile.");
    }).catch(() => alert("Manuel kopyala:\n" + jsonStr));

    closeAdminPanel();
}

window.onload = () => {
    loadData();
    if (window.location.hash.includes('admin')) showAdmin();
};
</script>
</body>
</html>
