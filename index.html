<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto-Subtitle Editor</title>
    <style>
        /* Modern Karanlık Tema */
        :root {
            --accent: #facc15; /* Sarı vurgu rengi */
            --bg: #0a0a0a;
            --panel: #161616;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Video Alanı (Shorts Formatı) */
        .preview-wrapper {
            position: relative;
            width: 340px;
            height: 600px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 5px solid #1a1a1a;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ALTYAZI TASARIMI (Somuncu Baba Stili) */
        #caption-overlay {
            position: absolute;
            top: 45%; /* Ekranın ortasında */
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .subtitle-word {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            /* Yazı Konturu ve Gölgesi */
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000;
            -webkit-text-stroke: 1.5px black;
            display: inline-block;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active {
            color: var(--accent) !important;
            transform: scale(1.2) rotate(-3deg);
        }

        /* Kontrol Paneli */
        .controls {
            margin-top: 25px;
            background: var(--panel);
            padding: 25px;
            border-radius: 15px;
            width: 340px;
            box-sizing: border-box;
            text-align: center;
        }

        input[type="file"] {
            margin-bottom: 20px;
            font-size: 12px;
            color: #888;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-family: monospace;
            font-size: 11px;
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="preview-wrapper">
        <video id="vPlayer" playsinline></video>
        <div id="caption-overlay">
            <span id="wordBox" class="subtitle-word"></span>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="vUpload" accept="video/*">
        <button id="processBtn">ALTYAZI OLUŞTUR VE BAŞLAT</button>
        <div id="status">Video yüklenmesi bekleniyor...</div>
    </div>

    <script>
        // Senin AssemblyAI API Anahtarın
        const API_KEY = "549e51d96f844ac19b843caeba52e697";
        
        const vPlayer = document.getElementById('vPlayer');
        const vUpload = document.getElementById('vUpload');
        const processBtn = document.getElementById('processBtn');
        const wordBox = document.getElementById('wordBox');
        const status = document.getElementById('status');

        let wordsData = []; // API'den gelen kelime zamanlamaları

        vUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                vPlayer.src = URL.createObjectURL(file);
                status.innerText = "Video hazır. Analizi başlatabilirsin.";
            }
        };

        processBtn.onclick = async () => {
            const file = vUpload.files[0];
            if (!file) return alert("Lütfen önce bir video seç!");

            processBtn.disabled = true;
            status.innerText = "1/3: Video yükleniyor...";

            try {
                // 1. ADIM: Dosyayı AssemblyAI'ya yükle
                const uploadRes = await fetch("https://api.assemblyai.com/v2/upload", {
                    method: "POST",
                    headers: { "authorization": API_KEY },
                    body: file
                });
                const { upload_url } = await uploadRes.json();

                // 2. ADIM: Transkripsiyon işlemini başlat (Hata düzeltildi)
                status.innerText = "2/3: Yapay zeka sesi analiz ediyor...";
                const transRes = await fetch("https://api.assemblyai.com/v2/transcript", {
                    method: "POST",
                    headers: { 
                        "authorization": API_KEY, 
                        "content-type": "application/json" 
                    },
                    body: JSON.stringify({ 
                        audio_url: upload_url, 
                        language_detection: true,
                        speech_models: ["universal-3-pro", "universal-2"] // Zorunlu parametreler eklendi
                    })
                });
                const { id: transcriptId } = await transRes.json();

                // 3. ADIM: Sonuç bitti mi diye kontrol et (Polling)
                const checkInterval = setInterval(async () => {
                    const pollRes = await fetch(`https://api.assemblyai.com/v2/transcript/${transcriptId}`, {
                        headers: { "authorization": API_KEY }
                    });
                    const pollResult = await pollRes.json();

                    if (pollResult.status === 'completed') {
                        clearInterval(checkInterval);
                        wordsData = pollResult.words; // Kelime listesini al
                        status.innerText = "3/3: Analiz Bitti! Oynatılıyor...";
                        processBtn.disabled = false;
                        vPlayer.play();
                    } else if (pollResult.status === 'error') {
                        clearInterval(checkInterval);
                        status.innerText = "HATA: " + pollResult.error;
                        processBtn.disabled = false;
                    } else {
                        status.innerText = "Analiz yapılıyor... Lütfen bekleyin.";
                    }
                }, 3000);

            } catch (err) {
                console.error(err);
                status.innerText = "Sistem hatası oluştu.";
                processBtn.disabled = false;
            }
        };

        // VİDEO OYNARKEN ALTYAZILARI GÜNCELLE
        vPlayer.ontimeupdate = () => {
            if (wordsData.length === 0) return;
            
            const currentTimeMs = vPlayer.currentTime * 1000;
            // O anki zamana denk gelen kelimeyi bul
            const currentWord = wordsData.find(w => currentTimeMs >= w.start && currentTimeMs <= w.end);

            if (currentWord) {
                if (wordBox.innerText !== currentWord.text) {
                    wordBox.innerText = currentWord.text;
                    wordBox.classList.add('active');
                    
                    // Animasyonu her yeni kelimede tetiklemek için sıfırla
                    wordBox.style.animation = 'none';
                    wordBox.offsetHeight; // Reflow tetikle
                    wordBox.style.animation = null;
                }
            } else {
                wordBox.innerText = "";
            }
        };
    </script>
</body>
</html>
