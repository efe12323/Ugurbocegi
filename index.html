<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Otomatik Altyazı Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .video-wrapper {
            position: relative;
            width: 320px;
            height: 568px;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.2);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        #subtitle-box {
            position: absolute;
            bottom: 25%;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* SOMUNCU BABA VİDEOSUNDAKİ STİL */
        .caption {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            display: inline-block;
            filter: drop-shadow(4px 4px 0px #000);
        }

        .word { display: inline-block; margin: 0 4px; color: #fff; }
        .highlight { color: #facc15; transform: scale(1.2) rotate(-3deg); }

        .ui-panel { margin-top: 20px; text-align: center; background: #111; padding: 20px; border-radius: 10px; }
        #progress { color: #38bdf8; font-family: monospace; margin-top: 10px; display: none; }
        
        input[type="file"] { margin-bottom: 10px; }
        button { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="player"></video>
        <div id="subtitle-box"></div>
    </div>

    <div class="ui-panel">
        <input type="file" id="upload" accept="video/*">
        <br>
        <button id="processBtn">VİDEOYU ANALİZ ET (AI)</button>
        <div id="progress">Yapay Zeka Hazırlanıyor...</div>
    </div>

    <script type="module">
        const upload = document.getElementById('upload');
        const player = document.getElementById('player');
        const processBtn = document.getElementById('processBtn');
        const progress = document.getElementById('progress');
        const subtitleBox = document.getElementById('subtitle-box');

        let pipeline;

        // 1. AI Modelini Yükle (OpenAI Whisper Tiny)
        async function initAI() {
            progress.style.display = "block";
            progress.innerText = "Yapay Zeka Modeli İndiriliyor (Yaklaşık 40MB)...";
            pipeline = await window.Transformers.pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny');
            progress.innerText = "Model Hazır! Dosya Seçin.";
        }

        initAI();

        processBtn.onclick = async () => {
            if (!upload.files[0]) return alert("Lütfen video seç!");
            
            const file = upload.files[0];
            const url = URL.createObjectURL(file);
            player.src = url;

            progress.innerText = "Ses Analiz Ediliyor... Lütfen Bekleyin.";
            processBtn.disabled = true;

            // 2. Ses Analizi ve Transkripsiyon
            try {
                const result = await pipeline(url, { 
                    chunk_length_s: 30, 
                    stride_length_s: 5,
                    language: 'turkish',
                    return_timestamps: 'word' 
                });

                window.subtitles = result.chunks; // Kelime zamanlarını kaydet
                progress.innerText = "Analiz Tamamlandı! Videoyu Oynatın.";
                processBtn.disabled = false;
            } catch (e) {
                console.error(e);
                progress.innerText = "Hata oluştu! Lütfen tekrar deneyin.";
            }
        };

        // 3. Videoyu İzle ve Altyazıyı Bas
        player.ontimeupdate = () => {
            if (!window.subtitles) return;
            
            const time = player.currentTime;
            // O anki kelimeyi bul
            const currentChunk = window.subtitles.find(c => time >= c.timestamp[0] && time <= c.timestamp[1]);

            if (currentChunk) {
                subtitleBox.innerHTML = `
                    <div class="caption">
                        <span class="word highlight">${currentChunk.text.trim()}</span>
                    </div>`;
            } else {
                subtitleBox.innerHTML = "";
            }
        };
    </script>
</body>
</html>
