<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Jet Altyazı Creator</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .preview-area {
            position: relative;
            width: 350px;
            height: 600px;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* VİDEODAKİ O MEŞHUR STİL */
        #caption-overlay {
            position: absolute;
            top: 50%; /* Yazıyı tam ortaya çektim, Shorts tarzı */
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }

        .highlight-text {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fbbf24; /* Sarı vurgu */
            text-shadow: 4px 4px 0px #000;
            display: inline-block;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        .controls { margin-top: 20px; padding: 20px; background: #111; border-radius: 10px; }
        button { background: #fbbf24; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 10px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="preview-area">
        <video id="vid" playsinline></video>
        <div id="caption-overlay"><span id="word" class="highlight-text"></span></div>
    </div>

    <div class="controls">
        <input type="file" id="up" accept="video/*">
        <button id="btn">ALTYAZI ÜRET</button>
        <div id="status">Hazır. Dosya seç ve başlat.</div>
    </div>

    <script>
        const vid = document.getElementById('vid');
        const wordBox = document.getElementById('word');
        const btn = document.getElementById('btn');
        const up = document.getElementById('up');
        const status = document.getElementById('status');

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) alert("Tarayıcınız bu sistemi desteklemiyor. Lütfen Chrome kullanın.");

        const rec = new Recognition();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'tr-TR';

        up.onchange = (e) => {
            vid.src = URL.createObjectURL(e.target.files[0]);
            status.innerText = "Video yüklendi. 'Üret' butonuna bas.";
        };

        btn.onclick = () => {
            vid.play();
            rec.start();
            status.innerText = "Yapay zeka sesi analiz ediyor...";
        };

        rec.onresult = (event) => {
            let currentText = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                currentText = event.results[i][0].transcript;
            }
            
            // Metni kelimelere böl ve sadece son kelimeyi büyük/sarı göster
            const words = currentText.trim().split(" ");
            const lastWord = words[words.length - 1];
            
            if(lastWord) {
                wordBox.innerText = lastWord;
                // Yazıyı her kelimede yeniden canlandır
                wordBox.style.animation = 'none';
                wordBox.offsetHeight; 
                wordBox.style.animation = null;
            }
        };

        rec.onend = () => { if(!vid.paused) rec.start(); }; // Video bitene kadar dinlemeyi kesme
    </script>
</body>
</html>
