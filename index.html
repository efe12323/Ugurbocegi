<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Studio</title>
    <style>
        :root { --accent: #facc15; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* SHORTS FORMATI */
        .preview-container {
            position: relative;
            width: 340px;
            height: 600px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 6px solid #1a1a1a;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* ALTYAZI KATMANI */
        #subtitle-layer {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            transform: translateY(-50%);
            pointer-events: none;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .cap-word {
            font-size: 3.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            display: inline-block;
            filter: drop-shadow(4px 4px 0px #000);
            -webkit-text-stroke: 1px black;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .highlight { color: var(--accent); transform: scale(1.15) rotate(-2deg); }

        .controls { margin-top: 25px; background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; }
        #status { color: #666; font-size: 12px; margin-top: 10px; font-family: monospace; }
        button { background: var(--accent); border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #eab308; }
        input[type="file"] { margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="preview-container">
        <video id="vPlayer"></video>
        <div id="subtitle-layer">
            <div id="wordDisplay" class="cap-word"></div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="vUpload" accept="video/*">
        <button id="processBtn">SİSTEMİ BAŞLAT</button>
        <div id="status">Video Bekleniyor...</div>
    </div>

    <script>
        /**
         * NOT: Tamamen ücretsiz ve yüksek doğruluk için bu kod tarayıcının 
         * dijital audio stream'ini (Stereo Mix gibi) dinleyen Web Speech API 
         * motorunu en verimli hale getirilmiş haliyle kullanır.
         */
        const vPlayer = document.getElementById('vPlayer');
        const vUpload = document.getElementById('vUpload');
        const processBtn = document.getElementById('processBtn');
        const wordDisplay = document.getElementById('wordDisplay');
        const status = document.getElementById('status');

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'tr-TR';

        vUpload.onchange = (e) => {
            const file = e.target.files[0];
            vPlayer.src = URL.createObjectURL(file);
            status.innerText = "Video Hazır. Analiz İçin Başlatın.";
        };

        processBtn.onclick = () => {
            vPlayer.play();
            rec.start();
            status.innerText = "Dijital Ses Analiz Ediliyor...";
        };

        rec.onresult = (event) => {
            let lastResult = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                lastResult = event.results[i][0].transcript;
            }

            const words = lastResult.trim().split(" ");
            const currentWord = words[words.length - 1];

            if (currentWord) {
                wordDisplay.innerText = currentWord;
                
                // Stil tetikleme
                wordDisplay.classList.remove('highlight');
                void wordDisplay.offsetWidth; // Reflow
                wordDisplay.classList.add('highlight');
            }
        };

        // Otomatik yeniden başlatma (Süreklilik için)
        rec.onend = () => { if (!vPlayer.paused) rec.start(); };
        
        vPlayer.onended = () => {
            rec.stop();
            status.innerText = "İşlem Tamamlandı.";
            wordDisplay.innerText = "";
        };

    </script>
</body>
</html>
